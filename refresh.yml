name: Refresh World Cup goals

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC)
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write             # allows the job to commit the updated data.json

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update data.json from live match feed
        run: node scripts/refresh.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Auto-update World Cup goal data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          else
            echo "No changes to data.json."
          fi
